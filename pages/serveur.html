```html
<script>

const servers = [

{
name:"Capitale",
id:"37949654",
ip:"213.239.204.205",
port:"7950",
img:"../images/valguero.jpg"
}

];

async function loadServers(){

const container = document.getElementById("servers");

for(const server of servers){

try{

const response = await fetch("https://api.battlemetrics.com/servers/"+server.id);
const data = await response.json();

const players = data.data.attributes.players;
const maxPlayers = data.data.attributes.maxPlayers;
const status = data.data.attributes.status;

let color = "red";
let text = "Offline";

if(status === "online"){
color = "lime";
text = "Online";
}

container.innerHTML += `

<div class="server">

<img src="${server.img}" width="130">

<div>

<h3>${server.name}</h3>

<p>${players} / ${maxPlayers} joueurs</p>

<p style="color:${color}">${text}</p>

</div>

<button onclick="join('${server.ip}','${server.port}')">
JOIN
</button>

</div>

`;

}catch(err){

console.log(err);

}

}

}

function join(ip,port){

window.location.href="steam://connect/"+ip+":"+port;

}

loadServers();

</script>
```
