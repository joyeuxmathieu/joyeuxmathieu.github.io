<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Cluster Alphark</title>

<style>

body{

margin:0;
font-family:Arial;
background:linear-gradient(#020617,#0f172a);
color:white;
text-align:center;

}

/* fond animé */

body::before{

content:"";
position:fixed;
width:100%;
height:100%;

background-image:radial-gradient(circle,#00aaff 1px,transparent 1px);

background-size:80px 80px;

animation:move 20s linear infinite;

opacity:0.15;

}

@keyframes move{

0%{transform:translateY(0)}
100%{transform:translateY(-80px)}

}

h1{

margin-top:40px;
font-size:42px;

}

#servers{

width:1000px;
margin:auto;

}

/* carte serveur */

.server{

display:flex;
align-items:center;
justify-content:space-between;

background:#1e293b;

margin:20px 0;

padding:20px;

border-radius:12px;

box-shadow:0 0 20px rgba(0,0,0,0.6);

}

.server img{

width:150px;
border-radius:8px;

}

.info{

text-align:left;
flex:1;
margin-left:20px;

}

.map{

font-size:22px;
font-weight:bold;

}

.players{

color:#cbd5f5;

}

.status{

font-weight:bold;

}

.online{

color:#00ff88;

}

.offline{

color:red;

}

/* bouton join */

button{

background:linear-gradient(45deg,#00aaff,#0066ff);

border:none;

padding:12px 28px;

color:white;

font-weight:bold;

border-radius:6px;

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:scale(1.1);

box-shadow:0 0 15px #00aaff;

}

</style>

</head>


<body>

<h1>Cluster ALPHARK</h1>

<div id="servers"></div>


<script>

const servers = [

{
name:"capitale",
id:"37949654",
ip:"213.239.204.205",
port:"7952",
img:"images/capitale.jpg"
},

{
name:"Valguero event",
id:"37948882",
ip:"213.239.204.205",
port:"7962",
img:"images/valguero event.jpg"
},
  
  
{
name:"The Island",
id:"37949820",
ip:"213.239.204.205",
port:"7812",
img:"images/island.jpg"
},

{
name:"The Center",
id:"37949823",
ip:"213.239.204.205",
port:"7822",
img:"images/center.jpg"
},

{
name:"Scorched Earth",
id:"37949818",
ip:"213.239.204.205",
port:"7832",
img:"images/scorched.jpg"
},

{
name:"Aberration",
id:"37949816",
ip:"213.239.204.205",
port:"7842",
img:"images/aberration.jpg"
},

{
name:"Extinction",
id:"37949824",
ip:"213.239.204.205",
port:"7852",
img:"images/extinction.jpg"
},

{
name:"Lost Colony",
id:"37949821",
ip:"213.239.204.205",
port:"7862",
img:"images/lost.jpg"
},

{
name:"Amissa",
id:"37949720",
ip:"213.239.204.205",
port:"7872",
img:"images/amissa.jpg"
},

{
name:"Ragnarok",
id:"37949927",
ip:"213.239.204.205",
port:"7882",
img:"images/ragnarok.jpg"
},

{
name:"Valguero",
id:"37949822",
ip:"213.239.204.205",
port:"7952",
img:"images/valguero.jpg"
},

{
name:"Astraeos",
id:"37949819",
ip:"213.239.204.205",
port:"7902",
img:"images/astraeos.jpg"
}

];


async function loadServers(){

const container = document.getElementById("servers");

for(const server of servers){

let players="0";
let max="0";
let status="offline";

try{

const res = await fetch(`https://api.battlemetrics.com/servers/${server.id}`);
const data = await res.json();

players = data.data.attributes.players;
max = data.data.attributes.maxPlayers;
status = data.data.attributes.status;

}catch{}

container.innerHTML += `

<div class="server">

<img src="${server.img}">

<div class="info">

<div class="map">${server.name}</div>

<div class="players">

${players} / ${max} joueurs

</div>

<div class="status ${status}">

${status}

</div>

</div>

<button onclick="join('${server.ip}','${server.port}')">

JOIN

</button>

</div>

`;

}

}


function join(ip,port){

window.location.href=`steam://connect/${ip}:${port}`;

}


loadServers();

</script>


</body>

</html>
</html>
