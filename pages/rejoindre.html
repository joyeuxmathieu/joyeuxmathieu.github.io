<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Cluster ALPHARK</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#05080f,#0b1425);
color:white;
text-align:center;
}

h1{
margin-top:40px;
font-size:42px;
letter-spacing:2px;
}

.container{
width:900px;
margin:auto;
margin-top:40px;
}

/* MAP CARD */

.map{

display:flex;
align-items:center;
justify-content:space-between;

background:rgba(15,25,45,0.8);

border:1px solid #1e3a5f;

border-radius:12px;

padding:15px;

margin:15px;

box-shadow:0 0 20px rgba(0,150,255,0.2);

}

/* IMAGE */

.map img{

width:160px;
border-radius:8px;

}

/* INFO */

.info{

flex:1;
text-align:left;
margin-left:20px;

}

.players{

font-size:14px;
opacity:0.8;

}

/* STATUS */

.status{

width:14px;
height:14px;

border-radius:50%;

display:inline-block;
margin-right:8px;

}

.online{

background:#00ff6a;
box-shadow:0 0 10px #00ff6a;

}

.offline{

background:#ff2e2e;
box-shadow:0 0 10px #ff2e2e;

}

/* BOUTON JOIN */

button{

background:linear-gradient(45deg,#00aaff,#0066ff);

border:none;

padding:12px 25px;

color:white;

font-weight:bold;

border-radius:6px;

cursor:pointer;

transition:0.3s;

box-shadow:0 0 10px #00aaff;

}

button:hover{

transform:scale(1.1);
box-shadow:0 0 20px #00aaff;

}

</style>

</head>

<body>

<h1>Cluster ALPHARK</h1>

<div class="container" id="servers"></div>

<script>

const serverIP = "TON_IP_SERVEUR";

/* MAPS */

const maps = [

{name:"The Island",port:7950,img:"https://static.wikia.nocookie.net/arksurvivalevolved_gamepedia/images/b/b1/The_Island.jpg"},
{name:"The Center",port:7820,img:"https://static.wikia.nocookie.net/arksurvivalevolved_gamepedia/images/7/7f/The_Center.jpg"},
{name:"Scorched Earth",port:7830,img:"https://static.wikia.nocookie.net/arksurvivalevolved_gamepedia/images/f/f0/Scorched_Earth.jpg"},
{name:"Aberration",port:7840,img:"https://static.wikia.nocookie.net/arksurvivalevolved_gamepedia/images/4/4e/Aberration.jpg"},
{name:"Extinction",port:7850,img:"https://static.wikia.nocookie.net/arksurvivalevolved_gamepedia/images/d/d4/Extinction.jpg"},
{name:"Lost Colony",port:7860,img:"https://static.wikia.nocookie.net/arksurvivalevolved_gamepedia/images/5/56/Lost_Colony.jpg"},
{name:"Amissa",port:7870,img:"https://static.wikia.nocookie.net/arksurvivalevolved_gamepedia/images/8/8a/Amissa.jpg"},
{name:"Ragnarok",port:7880,img:"https://static.wikia.nocookie.net/arksurvivalevolved_gamepedia/images/8/85/Ragnarok.jpg"},
{name:"Valguero",port:7890,img:"https://static.wikia.nocookie.net/arksurvivalevolved_gamepedia/images/6/6a/Valguero.jpg"},
{name:"Astraeos",port:7900,img:"https://static.wikia.nocookie.net/arksurvivalevolved_gamepedia/images/4/4b/Astraeos.jpg"}

];

async function loadServers(){

const container = document.getElementById("servers");

for(let map of maps){

let status="offline";
let players="Serveur offline";

try{

const res = await fetch(`https://api.mcsrvstat.us/2/${serverIP}:${map.port}`);
const data = await res.json();

if(data.players){

status="online";
players=`Joueurs : ${data.players.online} / ${data.players.max}`;

}

}catch{}

container.innerHTML += `

<div class="map">

<img src="${map.img}">

<div class="info">

<h3>
<span class="status ${status}"></span>
${map.name}
</h3>

<p class="players">${players}</p>

</div>

<button onclick="join(${map.port})">JOIN</button>

</div>

`;

}

}

function join(port){

window.location.href=`steam://connect/${serverIP}:${port}`

}

loadServers();

</script>

</body>

</html>
