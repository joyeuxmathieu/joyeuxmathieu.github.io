<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<title>Cluster ALPHARK</title>

<style>

/* FOND ARK ANIMÉ */

body{

margin:0;

font-family:Arial;

background:linear-gradient(180deg,#02040a,#0b1425);

color:white;

text-align:center;

overflow-x:hidden;

}

/* particules */

body::before{

content:"";

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background-image:radial-gradient(circle,#00aaff 1px,transparent 1px);

background-size:80px 80px;

animation:move 20s linear infinite;

opacity:0.15;

}

@keyframes move{

0%{transform:translateY(0)}

100%{transform:translateY(-80px)}

}

h1{

margin-top:40px;

font-size:40px;

letter-spacing:2px;

}

/* container */

.container{

width:900px;

margin:auto;

margin-top:40px;

}

/* carte serveur */

.server{

display:flex;

align-items:center;

justify-content:space-between;

background:rgba(15,25,45,0.9);

border:1px solid #1e3a5f;

border-radius:12px;

padding:15px;

margin:15px;

box-shadow:0 0 20px rgba(0,150,255,0.2);

}

.server img{

width:150px;

border-radius:8px;

}

.info{

flex:1;

text-align:left;

margin-left:20px;

}

.players{

font-size:14px;

opacity:0.8;

}

/* voyant */

.status{

width:14px;

height:14px;

border-radius:50%;

display:inline-block;

margin-right:8px;

}

.online{

background:#00ff6a;

box-shadow:0 0 10px #00ff6a;

}

.offline{

background:#ff2e2e;

box-shadow:0 0 10px #ff2e2e;

}

/* bouton join */

button{

background:linear-gradient(45deg,#00aaff,#0066ff);

border:none;

padding:12px 25px;

color:white;

font-weight:bold;

border-radius:6px;

cursor:pointer;

transition:0.3s;

box-shadow:0 0 10px #00aaff;

}

button:hover{

transform:scale(1.1);

box-shadow:0 0 20px #00aaff;

}

</style>

</head>

<body>

<h1>Cluster ALPHARK</h1>

<div class="container" id="servers"></div>

<script>

const ip = "213.239.204.205";

/* MAPS */

const maps = [

{name:"Capitale",port:7950,img:"../images/capitale.jpg"},

{name:"The Island",port:7810,img:"../images/the island.jpg"},

{name:"The Center",port:7820,img:"../images/the center.jpg"},

{name:"Scorched Earth",port:7830,img:"../images/Scorched Earth.jpg"},

{name:"Aberration",port:7840,img:"../images/Aberration.jpg"},

{name:"Extinction",port:7850,img:"../images/Extinction.jpg"},

{name:"Lost Colony",port:7860,img:"../images/Lost Colony.jpg"},

{name:"Amissa",port:7870,img:"../images/Amissa.jpg"},

{name:"Ragnarok",port:7880,img:"../images/Ragnarok.jpg"},

{name:"Valguero",port:7890,img:"../images/Valguero.jpg"},

{name:"Astraeos",port:7900,img:"../images/Astraeos.jpg"},
  
{name:"Valguero event",port:7960,img:"../images/Valguero event.jpg"}
];

async function loadServers(){

const container = document.getElementById("servers");

for(const map of maps){

let statusClass="offline";

let playersText="Serveur offline";

let pingText="";

try{

const start = Date.now();

const res = await fetch(`https://api.mcsrvstat.us/2/${ip}:${map.port}`);

const data = await res.json();

const ping = Date.now() - start;

if(data.players){

statusClass="online";

playersText=`Joueurs : ${data.players.online} / ${data.players.max}`;

pingText=`Ping : ${ping} ms`;

}

}catch(e){}

container.innerHTML += `

<div class="server">

<img src="${map.img}">

<div class="info">

<h3>

<span class="status ${statusClass}"></span>

${map.name}

</h3>

<p class="players">${playersText}</p>

<p class="players">${pingText}</p>

</div>

<button onclick="join(${map.port})">JOIN</button>

</div>

`;

}

}

function join(port){

window.location.href=`steam://connect/${ip}:${port}`;

}

loadServers();

</script>

</body>

</html>
