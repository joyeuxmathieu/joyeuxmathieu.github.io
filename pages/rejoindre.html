<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Rejoindre ALPHARK</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#0b0f17,#06090f);
color:white;
text-align:center;
}

h1{
margin-top:40px;
font-size:40px;
letter-spacing:2px;
}

.container{
width:900px;
margin:auto;
margin-top:40px;
}

/* MAP CARD */

.map{

display:flex;
align-items:center;
justify-content:space-between;

background:rgba(20,30,50,0.8);

border:1px solid #1e3a5f;

border-radius:10px;

padding:15px;

margin:15px;

box-shadow:0 0 15px rgba(0,200,255,0.2);

}

/* IMAGE MAP */

.map img{

width:160px;
border-radius:8px;

}

/* INFO */

.info{

flex:1;
text-align:left;
margin-left:20px;

}

/* STATUS */

.status{

width:14px;
height:14px;

border-radius:50%;

display:inline-block;
margin-right:8px;

}

.online{

background:#00ff6a;
box-shadow:0 0 10px #00ff6a;

}

.offline{

background:#ff2e2e;
box-shadow:0 0 10px #ff2e2e;

}

/* BOUTON JOIN */

button{

background:linear-gradient(45deg,#00aaff,#0055ff);

border:none;

padding:12px 25px;

color:white;

font-weight:bold;

border-radius:6px;

cursor:pointer;

transition:0.3s;

box-shadow:0 0 10px #00aaff;

}

button:hover{

transform:scale(1.1);

box-shadow:0 0 20px #00aaff;

}

</style>

</head>
