<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ALPHARK - Serveur ARK Survival Ascended</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:url("background.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
text-align:center;
}

/* Menu */
.menu{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.6);
padding:15px;
display:flex;
justify-content:center;
gap:40px;
z-index:1000;
}

.menu a{
color:white;
text-decoration:none;
font-size:18px;
transition:0.3s;
}

.menu a:hover{
color:#00eaff;
}

/* Section principale */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* Titre */
.hero h1{
font-size:60px;
color:#00eaff;
text-shadow:0 0 20px #00eaff;
margin-bottom:10px;
}

/* Sous titre */
.hero p{
font-size:20px;
margin-bottom:30px;
}

/* Bouton */
.button{
background:#00eaff;
padding:15px 40px;
border-radius:10px;
color:black;
font-weight:bold;
text-decoration:none;
transition:0.3s;
}

.button:hover{
background:white;
}

</style>

</head>

<body>

<!-- MENU -->
<nav class="menu">
<a href="#">Serveur</a>
<a href="#">Evenements</a>
<a href="#">Tribu</a>
<a href="#">Joueurs</a>
<a href="#">Bot</a>
<a href="#">Mod</a>
</nav>

<!-- PAGE PRINCIPALE -->
<section class="hero">

<h1>Bienvenue sur ALPHARK</h1>

<p>Serveur ARK Survival Ascended</p>

<a class="button" href="#">REJOINS NOUS</a>

</section>

</body>
</html>
